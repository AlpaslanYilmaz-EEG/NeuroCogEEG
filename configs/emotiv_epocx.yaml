
# =============================================================================
# NeuroCogEEG - Emotiv EPOC X Device Configuration
# =============================================================================
#
# This file contains only device-level information for Emotiv EPOC X recordings.
#
# Experiment-specific settings such as filters, notch filtering, ICA parameters,
# event markers, ERP windows, epoch durations, baselines and ROI definitions
# must be stored in the corresponding experiment YAML files.
# =============================================================================

device:
  name: "Emotiv EPOC X"
  manufacturer: "Emotiv"
  channel_count: 14

channels:
  eeg:
    - AF3
    - F7
    - F3
    - FC5
    - T7
    - P7
    - O1
    - O2
    - P8
    - T8
    - FC6
    - F4
    - F8
    - AF4

  eog:
    - AF3
    - AF4

montage:
  name: "standard_1020"
  coordinate_frame: "head"

reference:
  type: "average"

marker_channels:
  candidates:
    - MarkerValueInt
    - MARKER_HARDWARE

  # Used only when no named marker channel is found.
  # This preserves compatibility with older EDF exports.
  fallback_index: 25

  # Marker channel values in some EDF exports are stored in scaled units.
  # Previous analysis scripts used: marker_value = raw_value * 1000000
  scale_factor: 1000000

  zero_value: 0
  # Used only when no named marker channel is found.
  # This preserves compatibility with older EDF exports.
  fallback_index: 25

