# =============================================================================
# NeuroCogEEG - Go/No-Go Experiment Configuration
# =============================================================================
#
# Numeric event codes have no global meaning in NeuroCogEEG.
# Their meaning is defined only within this experiment configuration.
# =============================================================================

experiment:
  name: "gonogo"
  description: "Go/No-Go task EEG analysis"

events:
  stimulus: 48
  correct_response: 49
  error_response: 50
  missed_response: 51

preprocessing:
  filtering:
    ica:
      l_freq: 1.0
      h_freq: 100.0

    analysis:
      l_freq: 0.05
      h_freq: 30.0

  notch_filter:
    enabled: true
    frequency: 50.0

  ica:
    enabled: true
    method: "picard"
    n_components: 10
    random_state: 97

    fit_params:
      ortho: false
      extended: true

  iclabel:
    enabled: true
    method: "iclabel"
    exclude_non_brain: true

epochs:
  stimulus_locked:
    event: stimulus
    tmin: -0.2
    tmax: 0.8
    baseline:
      start: -0.2
      end: 0.0

  response_locked:
    events:
      - correct_response
      - error_response
    tmin: -0.8
    tmax: 0.5
    baseline:
      start: -0.8
      end: -0.6

behavior:
  reaction_time:
    start_event: stimulus
    end_event: correct_response
    min_ms: 100
    max_ms: 1500

  accuracy:
    correct_event: correct_response
    total_event: stimulus

erp_components:
  n2:
    condition: stimulus
    window:
      start: 0.20
      end: 0.35
    roi:
      - F3
      - F4
      - FC5
      - FC6
    method: peak
    polarity: negative

  p3:
    condition: stimulus
    window:
      start: 0.30
      end: 0.60
    roi:
      - P7
      - P8
      - O1
      - O2
    method: peak
    polarity: positive

response_locked:
  rp:
    condition: correct_response
    window:
      start: -0.50
      end: 0.00
    roi:
      - F3
      - F4
      - FC5
      - FC6
    peak_polarity: negative

  pmp:
    condition: correct_response
    window:
      start: 0.15
      end: 0.35
    roi:
      - F3
      - F4
      - FC5
      - FC6
    peak_polarity: positive

connectivity:
  methods:
    - coh
    - wpli
    - ciplv

  mode: multitaper
  faverage: true
  fisher_z: false

  time_window:
    start: 0.00
    end: 0.75

  frequency_bands:
    theta:
      fmin: 4.0
      fmax: 8.0

    alpha:
      fmin: 8.0
      fmax: 13.0

    beta:
      fmin: 13.0
      fmax: 30.0

  pairs:
    interhemispheric:
      - source: F3
        target: F4

    intrahemispheric_left:
      - source: F3
        target: P7

    intrahemispheric_right:
      - source: F4
        target: P8

quality_control:
  reject_criteria:
    eeg_uv: 150.0

  minimum_trials:
    stimulus_locked: 10
    response_locked: 10
    connectivity: 10